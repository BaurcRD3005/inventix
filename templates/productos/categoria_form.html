<!-- templates/productos/categoria_form.html -->
{% extends 'base.html' %}

{% block title %}{{ titulo }} - Inventix{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    
    <!-- Encabezado / Título de la sección -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-gray-900 flex items-center gap-2.5">
                <svg class="w-7 h-7 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                </svg>
                {{ titulo }}
            </h1>
            <p class="text-sm text-gray-500 mt-1">Completa los datos correspondientes para la categoría de productos.</p>
        </div>
    </div>

    <!-- Tarjeta del Formulario -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6 sm:p-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <!-- Campo: Nombre -->
                <div>
                    <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-1.5">Nombre <span class="text-red-500">*</span></label>
                    <input type="text" name="nombre" id="nombre" 
                           value="{{ categoria.nombre|default:'' }}" required
                           class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-gray-900 focus:border-gray-900 block p-3 transition-colors"
                           placeholder="Ej. Electrónica, Ropa, Herramientas...">
                </div>

                <!-- Campo: Descripción -->
                <div>
                    <label for="descripcion" class="block text-sm font-semibold text-gray-700 mb-1.5">Descripción</label>
                    <textarea name="descripcion" id="descripcion" rows="3"
                              class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-gray-900 focus:border-gray-900 block p-3 transition-colors resize-none"
                              placeholder="Breve descripción de la categoría (opcional)...">{{ categoria.descripcion|default:'' }}</textarea>
                </div>

                <!-- Botones de Acción -->
                <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
                    <a href="{% url 'productos:categoria_lista' %}" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition-colors">
                        Cancelar
                    </a>
                    
                    <button type="submit" class="inline-flex items-center justify-center gap-2 px-5 py-2.5 bg-gray-900 hover:bg-gray-800 text-white text-sm font-semibold rounded-xl shadow-sm transition-all duration-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        {{ accion }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
